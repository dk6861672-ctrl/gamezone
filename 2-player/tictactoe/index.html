<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow"/>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<script>
/* ── SECURITY SHIELD ── */
(function(){
  'use strict';
  // Block right-click
  document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
  // Block keyboard shortcuts
  document.addEventListener('keydown',function(e){
    var k=e.key||'';
    if(k==='F12'){e.preventDefault();e.stopPropagation();return false;}
    if(e.ctrlKey&&e.shiftKey&&'iIjJcCkKeE'.indexOf(k)!==-1){e.preventDefault();return false;}
    if(e.ctrlKey&&'uUsSpPaA'.indexOf(k)!==-1){e.preventDefault();return false;}
    if(e.ctrlKey&&e.altKey){e.preventDefault();return false;}
    if(k==='F11'||k==='F10'||k==='F5'){e.preventDefault();return false;}
  },true);
  // Block select / drag / copy / cut / paste
  ['selectstart','dragstart','copy','cut','paste'].forEach(function(ev){
    document.addEventListener(ev,function(e){e.preventDefault();});
  });
  // Block print
  window.addEventListener('beforeprint',function(e){e.preventDefault();window.stop();});
  // DevTools size detection
  var _devCheck=function(){
    var t=window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160;
    if(t){
      document.body.innerHTML='<div style="background:#0a0a1a;color:#ff4444;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem;letter-spacing:4px;"><div style="font-size:3rem;">⛔</div><div style="font-size:1.5rem;">ACCESS DENIED</div><div style="font-size:0.7rem;opacity:0.5;">KRIXEL SECURITY</div></div>';
    }
  };
  setInterval(_devCheck,800);
  // Disable images drag
  window.addEventListener('load',function(){
    document.querySelectorAll('img,canvas,svg').forEach(function(el){
      el.setAttribute('oncontextmenu','return false;');
      el.setAttribute('draggable','false');
    });
  });
  // No-print + no-select global styles
  var s=document.createElement('style');
  s.textContent='@media print{body,html{display:none!important;visibility:hidden!important;}}*{-webkit-user-select:none!important;-moz-user-select:none!important;-ms-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;}';
  document.head.appendChild(s);
  // Disable view-source via history trick
  try{history.pushState(null,null,location.href);}catch(e){}
  window.addEventListener('popstate',function(){
    try{history.pushState(null,null,location.href);}catch(e){}
  });
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Krixel — Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:       #07080f;
  --panel:    #0d0f1e;
  --panel2:   #12152a;
  --border:   #1e2340;
  --x-col:    #ff6b35;
  --o-col:    #00d4ff;
  --x-glow:   rgba(255,107,53,0.6);
  --o-glow:   rgba(0,212,255,0.6);
  --grid-ln:  #2a2f5a;
  --text:     #e8eaf6;
  --muted:    #4a5080;
  --muted2:   #7a80b0;
  --win-line: #ffd700;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── SCANLINE OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.07) 0px,
    rgba(0,0,0,0.07) 1px,
    transparent 1px,
    transparent 3px
  );
}
/* CRT corner vignette */
body::after{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:998;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
}

/* ── FLOATING PARTICLES ── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;
  animation:float-up linear infinite;
  opacity:0;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.3;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* ══════════════════════════════════
   SETUP SCREEN
══════════════════════════════════ */
#setup{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;text-align:center;
  background:var(--bg);
}
#setup.hidden{display:none;}

.setup-brand{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(0.5rem,2.5vw,0.75rem);
  color:var(--muted2);letter-spacing:4px;
  margin-bottom:1.2rem;
}
.setup-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(1.2rem,5vw,2rem);
  line-height:1.6;
  margin-bottom:0.5rem;
  position:relative;
}
.setup-title .t-x{color:var(--x-col);text-shadow:0 0 20px var(--x-glow);}
.setup-title .t-o{color:var(--o-col);text-shadow:0 0 20px var(--o-glow);}
.setup-title .t-w{color:var(--text);}

.setup-sub{
  font-size:0.75rem;color:var(--muted2);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:2.5rem;font-weight:600;
}

.player-inputs{
  display:flex;gap:1.5rem;margin-bottom:2.5rem;
  flex-wrap:wrap;justify-content:center;
}
.p-wrap{display:flex;flex-direction:column;align-items:center;gap:0.6rem;}
.p-badge{
  font-family:'Press Start 2P',monospace;font-size:0.5rem;
  letter-spacing:2px;padding:0.3rem 1rem;border-radius:4px;
  border:2px solid;
}
.p-badge.px{color:var(--x-col);border-color:var(--x-col);background:rgba(255,107,53,0.08);
  text-shadow:0 0 8px var(--x-glow);}
.p-badge.po{color:var(--o-col);border-color:var(--o-col);background:rgba(0,212,255,0.08);
  text-shadow:0 0 8px var(--o-glow);}

.p-input{
  background:var(--panel2);
  border:2px solid var(--border);
  border-radius:6px;padding:0.7rem 1rem;
  color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  text-align:center;width:170px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  letter-spacing:1px;
}
.p-input.ix:focus{border-color:var(--x-col);box-shadow:0 0 12px rgba(255,107,53,0.25);}
.p-input.io:focus{border-color:var(--o-col);box-shadow:0 0 12px rgba(0,212,255,0.25);}

.btn-start{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(0.5rem,2vw,0.72rem);
  letter-spacing:2px;padding:1rem 2.5rem;
  border:none;border-radius:6px;cursor:pointer;
  background:linear-gradient(135deg,var(--x-col),#ff9500);
  color:#07080f;
  box-shadow:0 0 30px rgba(255,107,53,0.4),0 4px 0 #b84000;
  transition:all 0.15s;
  position:relative;top:0;
}
.btn-start:hover{top:-2px;box-shadow:0 0 50px rgba(255,107,53,0.6),0 6px 0 #b84000;}
.btn-start:active{top:2px;box-shadow:0 0 20px rgba(255,107,53,0.3),0 2px 0 #b84000;}

/* ══════════════════════════════════
   GAME SCREEN
══════════════════════════════════ */
#game{
  width:100vw;height:100dvh;
  display:none;flex-direction:column;
  position:relative;z-index:1;
}

/* ── TOP / BOTTOM PLAYER BARS ── */
.p-bar{
  flex-shrink:0;height:70px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  transition:background 0.3s,border-color 0.3s;
  position:relative;z-index:2;
}
.bar-x{
  background:rgba(255,107,53,0.06);
  border-bottom:2px solid rgba(255,107,53,0.2);
}
.bar-o{
  background:rgba(0,212,255,0.06);
  border-top:2px solid rgba(0,212,255,0.2);
  transform:rotate(180deg);
}
.bar-x.active{background:rgba(255,107,53,0.15);border-bottom-color:var(--x-col);}
.bar-o.active{background:rgba(0,212,255,0.15);border-top-color:var(--o-col);}

.bar-left{display:flex;flex-direction:column;gap:2px;}
.bar-sym{
  font-family:'Press Start 2P',monospace;
  font-size:1.2rem;line-height:1;
  transition:text-shadow 0.3s;
}
.bar-x .bar-sym{color:var(--x-col);}
.bar-x.active .bar-sym{text-shadow:0 0 16px var(--x-glow);}
.bar-o .bar-sym{color:var(--o-col);}
.bar-o.active .bar-sym{text-shadow:0 0 16px var(--o-glow);}
.bar-name{
  font-size:0.75rem;font-weight:700;letter-spacing:1px;
  color:var(--muted2);transition:color 0.3s;
  text-transform:uppercase;
}
.bar-x.active .bar-name{color:var(--x-col);}
.bar-o.active .bar-name{color:var(--o-col);}
.bar-turn{
  font-family:'Press Start 2P',monospace;
  font-size:0.4rem;letter-spacing:2px;
  color:transparent;transition:color 0.3s;
}
.bar-x.active .bar-turn{color:rgba(255,107,53,0.7);}
.bar-o.active .bar-turn{color:rgba(0,212,255,0.7);}

.bar-score{
  font-family:'Press Start 2P',monospace;
  font-size:2rem;line-height:1;
  opacity:0.2;transition:opacity 0.3s,text-shadow 0.3s;
}
.bar-x .bar-score{color:var(--x-col);}
.bar-x.active .bar-score{opacity:1;text-shadow:0 0 20px var(--x-glow);}
.bar-o .bar-score{color:var(--o-col);}
.bar-o.active .bar-score{opacity:1;text-shadow:0 0 20px var(--o-glow);}

/* ── BOARD AREA ── */
.board-area{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:8px;
  position:relative;
}

/* status */
.status{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(0.38rem,1.8vw,0.55rem);
  letter-spacing:2px;color:var(--muted2);
  padding:0.5rem 1.2rem;
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;min-height:32px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;max-width:340px;width:100%;
  text-align:center;line-height:1.6;
}
.status.sx{color:var(--x-col);border-color:rgba(255,107,53,0.3);
  box-shadow:0 0 10px rgba(255,107,53,0.1);}
.status.so{color:var(--o-col);border-color:rgba(0,212,255,0.3);
  box-shadow:0 0 10px rgba(0,212,255,0.1);}
.status.sw{color:var(--win-line);border-color:rgba(255,215,0,0.4);
  box-shadow:0 0 14px rgba(255,215,0,0.2);}

/* ── THE BOARD ── */
.board-wrap{position:relative;}

#board{
  display:grid;grid-template-columns:repeat(3,1fr);
  position:relative;
  /* size set by JS */
}

/* grid lines via SVG overlay */
#grid-svg{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  width:100%;height:100%;
}
#grid-svg line{
  stroke:var(--grid-ln);stroke-width:3;stroke-linecap:round;
  stroke-dasharray:400;stroke-dashoffset:400;
  animation:draw-line 0.5s ease forwards;
}
#grid-svg line:nth-child(1){animation-delay:0.05s;}
#grid-svg line:nth-child(2){animation-delay:0.15s;}
#grid-svg line:nth-child(3){animation-delay:0.25s;}
#grid-svg line:nth-child(4){animation-delay:0.35s;}
@keyframes draw-line{to{stroke-dashoffset:0;}}

/* win line */
#win-svg{
  position:absolute;inset:0;pointer-events:none;z-index:3;
  width:100%;height:100%;display:none;
}
#win-svg line{
  stroke:var(--win-line);stroke-width:5;stroke-linecap:round;
  stroke-dasharray:600;stroke-dashoffset:600;
  filter:drop-shadow(0 0 8px var(--win-line));
  animation:draw-win 0.4s ease forwards;
}
@keyframes draw-win{to{stroke-dashoffset:0;}}

/* ── CELLS ── */
.cell{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:transparent;border:none;
  position:relative;z-index:2;
  transition:background 0.15s;
  border-radius:0;
}
.cell:hover:not(.taken){background:rgba(255,255,255,0.03);}
.cell.taken{cursor:default;}

/* SVG marks inside cells */
.cell svg{
  width:55%;height:55%;
  overflow:visible;
}
/* X strokes */
.x-line{
  stroke:var(--x-col);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:80;stroke-dashoffset:80;
  filter:drop-shadow(0 0 6px var(--x-glow));
  animation:draw-mark 0.25s ease forwards;
}
.x-line:nth-child(2){animation-delay:0.12s;}
/* O circle */
.o-circle{
  stroke:var(--o-col);stroke-width:6;fill:none;
  stroke-dasharray:220;stroke-dashoffset:220;
  filter:drop-shadow(0 0 6px var(--o-glow));
  animation:draw-mark 0.35s ease forwards;
}
@keyframes draw-mark{to{stroke-dashoffset:0;}}

/* restart btn */
.restart-btn{
  position:absolute;bottom:80px;right:14px;z-index:5;
  width:38px;height:38px;border-radius:50%;
  background:var(--panel2);border:2px solid var(--border);
  color:var(--muted2);font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;
}
.restart-btn:hover{border-color:var(--x-col);color:var(--x-col);
  box-shadow:0 0 10px rgba(255,107,53,0.3);}

/* ══════════════════════════════════
   WIN / DRAW MODAL
══════════════════════════════════ */
#modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(7,8,15,0.88);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
}
#modal.show{display:flex;}
.modal-box{
  background:var(--panel);
  border:2px solid var(--border);
  border-radius:12px;padding:2.2rem 2rem;
  text-align:center;max-width:320px;width:90%;
  position:relative;overflow:hidden;
  animation:modal-pop 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modal-pop{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.modal-glow{
  position:absolute;width:250px;height:250px;
  border-radius:50%;filter:blur(60px);opacity:0.18;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.modal-brand{
  font-family:'Press Start 2P',monospace;font-size:0.55rem;
  letter-spacing:4px;color:var(--muted2);
  margin-bottom:1.2rem;display:block;position:relative;z-index:1;
}
.modal-sym{
  font-family:'Press Start 2P',monospace;
  font-size:2.8rem;margin-bottom:0.6rem;
  position:relative;z-index:1;
  animation:sym-pop 0.4s 0.2s both cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes sym-pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{
  font-family:'Press Start 2P',monospace;font-size:clamp(0.7rem,3vw,1rem);
  color:var(--text);margin-bottom:0.4rem;
  position:relative;z-index:1;line-height:1.6;
}
.modal-sub{
  color:var(--muted2);font-size:0.85rem;font-weight:600;
  letter-spacing:1px;margin-bottom:1.5rem;
  position:relative;z-index:1;
}
.modal-scores{
  display:flex;gap:0.8rem;justify-content:center;
  margin-bottom:1.5rem;position:relative;z-index:1;
}
.mscore{
  padding:0.7rem 1rem;border-radius:8px;
  background:var(--panel2);border:1px solid var(--border);
  min-width:90px;
}
.mscore-sym{
  font-family:'Press Start 2P',monospace;
  font-size:0.9rem;margin-bottom:0.4rem;
}
.mscore-name{font-size:0.7rem;font-weight:700;letter-spacing:1px;
  color:var(--muted2);margin-bottom:0.3rem;text-transform:uppercase;}
.mscore-num{
  font-family:'Press Start 2P',monospace;font-size:1.4rem;
}
.modal-btns{display:flex;flex-direction:column;gap:0.5rem;position:relative;z-index:1;}
.btn-again{
  font-family:'Press Start 2P',monospace;font-size:0.55rem;
  letter-spacing:2px;padding:0.85rem 1.5rem;border-radius:6px;
  border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--x-col),#ff9500);
  color:#07080f;
  box-shadow:0 0 20px rgba(255,107,53,0.3),0 3px 0 #b84000;
  transition:all 0.15s;
}
.btn-again:hover{box-shadow:0 0 35px rgba(255,107,53,0.5),0 3px 0 #b84000;}
.btn-back{
  font-family:'Press Start 2P',monospace;font-size:0.48rem;
  letter-spacing:1px;padding:0.7rem 1.5rem;border-radius:6px;
  border:2px solid var(--border);background:transparent;
  color:var(--muted2);cursor:pointer;transition:all 0.2s;
}
.btn-back:hover{border-color:var(--o-col);color:var(--o-col);
  box-shadow:0 0 12px rgba(0,212,255,0.2);}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:199;}

/* reduced motion */
@media(prefers-reduced-motion:reduce){
  #grid-svg line,#win-svg line,.x-line,.o-circle{animation:none;stroke-dashoffset:0;}
  .modal-box{animation:none;}
  .modal-sym{animation:none;}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<canvas id="confetti"></canvas>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-brand">KRIXEL GAMES</div>
  <div class="setup-title">
    <span class="t-x">TIC</span><span class="t-w"> </span><span class="t-o">TAC</span><br>
    <span class="t-x">T</span><span class="t-o">O</span><span class="t-w">E</span>
  </div>
  <div class="setup-sub">2 PLAYER DUEL</div>

  <div class="player-inputs">
    <div class="p-wrap">
      <div class="p-badge px">✕ PLAYER X</div>
      <input class="p-input ix" id="p1name" type="text" placeholder="Enter name" maxlength="10" autocomplete="off"/>
    </div>
    <div class="p-wrap">
      <div class="p-badge po">○ PLAYER O</div>
      <input class="p-input io" id="p2name" type="text" placeholder="Enter name" maxlength="10" autocomplete="off"/>
    </div>
  </div>
  <button class="btn-start" id="btn-start">INSERT COIN ▶</button>
</div>

<!-- ── GAME ── -->
<div id="game">
  <!-- P2 bar (top, rotated) -->
  <div class="p-bar bar-o" id="barO">
    <div class="bar-left">
      <div class="bar-sym">○</div>
      <div class="bar-name" id="oName">PLAYER O</div>
      <div class="bar-turn" id="oTurn">YOUR TURN</div>
    </div>
    <div class="bar-score" id="oScore">0</div>
  </div>

  <!-- Board -->
  <div class="board-area">
    <div class="status" id="status">CHOOSE A CELL</div>
    <div class="board-wrap" id="boardWrap">
      <div id="board"></div>
      <svg id="grid-svg" viewBox="0 0 300 300" preserveAspectRatio="none"></svg>
      <svg id="win-svg"  viewBox="0 0 300 300" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- P1 bar (bottom) -->
  <div class="p-bar bar-x" id="barX">
    <div class="bar-left">
      <div class="bar-sym">✕</div>
      <div class="bar-name" id="xName">PLAYER X</div>
      <div class="bar-turn" id="xTurn">YOUR TURN</div>
    </div>
    <div class="bar-score" id="xScore">0</div>
  </div>

  <button class="restart-btn" id="restartBtn" title="Restart">⟲</button>
</div>

<!-- ── WIN MODAL ── -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-glow" id="mGlow"></div>
    <span class="modal-brand">KRIXEL</span>
    <div class="modal-sym" id="mSym">✕</div>
    <div class="modal-title" id="mTitle">PLAYER X WINS!</div>
    <div class="modal-sub"  id="mSub">EXCELLENT PLAY!</div>
    <div class="modal-scores">
      <div class="mscore">
        <div class="mscore-sym" id="ms-xsym" style="color:var(--x-col)">✕</div>
        <div class="mscore-name" id="ms-xname">P-X</div>
        <div class="mscore-num"  id="ms-xnum" style="color:var(--x-col)">0</div>
      </div>
      <div class="mscore">
        <div class="mscore-sym" id="ms-osym" style="color:var(--o-col)">○</div>
        <div class="mscore-name" id="ms-oname">P-O</div>
        <div class="mscore-num"  id="ms-onum" style="color:var(--o-col)">0</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-again" id="btn-again">PLAY AGAIN</button>
      <button class="btn-back"  id="btn-back">CHANGE PLAYERS</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── PARTICLES ── */
(function spawnParticles(){
  var el=document.getElementById('particles');
  var cols=['#ff6b35','#00d4ff','#ffd700','#ff6b9d','#6bcb77'];
  for(var i=0;i<18;i++){
    var p=document.createElement('div');
    p.className='particle';
    var sz=2+Math.random()*4;
    p.style.cssText=[
      'width:'+sz+'px','height:'+sz+'px',
      'left:'+(Math.random()*100)+'%',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'animation-duration:'+(6+Math.random()*10)+'s',
      'animation-delay:'+(-Math.random()*12)+'s'
    ].join(';');
    el.appendChild(p);
  }
})();

/* ── STATE ── */
var state={
  px:'PLAYER X', po:'PLAYER O',
  board:['','','','','','','','',''],
  turn:'X', // X or O
  scores:{X:0,O:0},
  over:false
};

var WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

/* ── ELEMENTS ── */
var setupEl  =document.getElementById('setup');
var gameEl   =document.getElementById('game');
var boardEl  =document.getElementById('board');
var boardWrap=document.getElementById('boardWrap');
var gridSvg  =document.getElementById('grid-svg');
var winSvg   =document.getElementById('win-svg');
var statusEl =document.getElementById('status');
var barX     =document.getElementById('barX');
var barO     =document.getElementById('barO');
var xNameEl  =document.getElementById('xName');
var oNameEl  =document.getElementById('oName');
var xScoreEl =document.getElementById('xScore');
var oScoreEl =document.getElementById('oScore');
var xTurnEl  =document.getElementById('xTurn');
var oTurnEl  =document.getElementById('oTurn');
var modal    =document.getElementById('modal');

/* ── SETUP EVENTS ── */
document.getElementById('p1name').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('p2name').focus();
});
document.getElementById('p2name').addEventListener('keydown',function(e){
  if(e.key==='Enter') startGame();
});
document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',function(){resetRound();});
document.getElementById('btn-again').addEventListener('click',function(){
  modal.classList.remove('show');
  stopConfetti();
  resetRound();
});
document.getElementById('btn-back').addEventListener('click',function(){
  modal.classList.remove('show');
  stopConfetti();
  gameEl.style.display='none';
  setupEl.classList.remove('hidden');
  setupEl.style.display='flex';
});

/* ── START GAME ── */
function startGame(){
  state.px=document.getElementById('p1name').value.trim().toUpperCase()||'PLAYER X';
  state.po=document.getElementById('p2name').value.trim().toUpperCase()||'PLAYER O';
  state.scores={X:0,O:0};
  state.turn='X';

  xNameEl.textContent=state.px;
  oNameEl.textContent=state.po;
  document.getElementById('ms-xname').textContent=state.px;
  document.getElementById('ms-oname').textContent=state.po;

  setupEl.style.display='none';
  gameEl.style.display='flex';

  requestAnimationFrame(function(){
    buildBoard();
    resetRound(true);
  });
}

/* ── BUILD BOARD (size from screen) ── */
function buildBoard(){
  var wrap  =boardWrap.parentElement;
  var availW=wrap.clientWidth - 24;
  var availH=wrap.clientHeight - 70;
  var sz    =Math.min(availW, availH, 360);
  sz        =Math.max(sz, 200);

  boardWrap.style.width =sz+'px';
  boardWrap.style.height=sz+'px';

  // board cells
  boardEl.style.width =sz+'px';
  boardEl.style.height=sz+'px';
  boardEl.innerHTML='';

  for(var i=0;i<9;i++){
    var cell=document.createElement('button');
    cell.className='cell';
    cell.dataset.i=i;
    cell.style.width=(sz/3)+'px';
    cell.style.height=(sz/3)+'px';
    cell.addEventListener('click',onCellClick);
    boardEl.appendChild(cell);
  }

  // grid lines SVG
  var t=sz/3, tw=sz*2/3;
  gridSvg.innerHTML='';
  gridSvg.setAttribute('viewBox','0 0 '+sz+' '+sz);
  winSvg .setAttribute('viewBox','0 0 '+sz+' '+sz);
  [[t,0,t,sz],[tw,0,tw,sz],[0,t,sz,t],[0,tw,sz,tw]].forEach(function(ln){
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ln[0]);line.setAttribute('y1',ln[1]);
    line.setAttribute('x2',ln[2]);line.setAttribute('y2',ln[3]);
    // re-trigger animation
    line.style.strokeDasharray=sz*1.5;
    line.style.strokeDashoffset=sz*1.5;
    gridSvg.appendChild(line);
  });
  // re-trigger CSS animations
  gridSvg.querySelectorAll('line').forEach(function(l,i){
    l.style.animation='none';
    l.offsetHeight; // reflow
    l.style.animation='';
  });
}

/* ── RESET ROUND (keep scores) ── */
function resetRound(keepTurn){
  state.board=['','','','','','','','',''];
  state.over=false;
  if(!keepTurn) state.turn='X';

  // clear cells
  boardEl.querySelectorAll('.cell').forEach(function(c){
    c.innerHTML='';c.classList.remove('taken');
  });
  winSvg.style.display='none';
  winSvg.innerHTML='';
  updateTurnUI();
  setStatus('','');
}

/* ── CELL CLICK ── */
function onCellClick(e){
  var idx=parseInt(e.currentTarget.dataset.i);
  if(state.over) return;
  if(state.board[idx]!=='') return;

  state.board[idx]=state.turn;
  e.currentTarget.classList.add('taken');
  drawMark(e.currentTarget, state.turn);

  var win=checkWin();
  if(win){
    state.over=true;
    state.scores[state.turn]++;
    updateScores();
    drawWinLine(win);
    var who=state.turn==='X'?state.px:state.po;
    setStatus(who+' WINS!','sw');
    setTimeout(function(){showModal(state.turn);},800);
    return;
  }
  if(state.board.every(function(c){return c!=='';})){
    state.over=true;
    setStatus("IT'S A DRAW!",'');
    setTimeout(function(){showModal(null);},600);
    return;
  }

  state.turn=state.turn==='X'?'O':'X';
  updateTurnUI();
  var next=state.turn==='X'?state.px:state.po;
  setStatus(next+"'S TURN", state.turn==='X'?'sx':'so');
}

/* ── DRAW X or O via SVG ── */
function drawMark(cell, mark){
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');
  if(mark==='X'){
    var pad=18;
    [[pad,pad,100-pad,100-pad],[100-pad,pad,pad,100-pad]].forEach(function(c){
      var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',c[0]);ln.setAttribute('y1',c[1]);
      ln.setAttribute('x2',c[2]);ln.setAttribute('y2',c[3]);
      ln.className.baseVal='x-line';
      svg.appendChild(ln);
    });
  } else {
    var circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circ.setAttribute('cx','50');circ.setAttribute('cy','50');circ.setAttribute('r','32');
    circ.className.baseVal='o-circle';
    svg.appendChild(circ);
  }
  cell.appendChild(svg);
}

/* ── CHECK WIN ── */
function checkWin(){
  for(var i=0;i<WINS.length;i++){
    var w=WINS[i];
    if(state.board[w[0]]&&state.board[w[0]]===state.board[w[1]]&&state.board[w[1]]===state.board[w[2]]){
      return w;
    }
  }
  return null;
}

/* ── DRAW WIN LINE ── */
function drawWinLine(w){
  var sz=parseInt(boardWrap.style.width)||300;
  var cs=sz/3;
  // center of each cell
  function cx(i){return (i%3)*cs+cs/2;}
  function cy(i){return Math.floor(i/3)*cs+cs/2;}
  var pad=18;
  var x1=cx(w[0]),y1=cy(w[0]),x2=cx(w[2]),y2=cy(w[2]);
  // extend line slightly past cells
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  x1-=dx/len*pad; y1-=dy/len*pad;
  x2+=dx/len*pad; y2+=dy/len*pad;

  winSvg.innerHTML='';
  winSvg.style.display='block';
  var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);
  ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
  var lineLen=Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1))+20;
  ln.style.strokeDasharray=lineLen;
  ln.style.strokeDashoffset=lineLen;
  ln.style.animation='draw-win 0.4s ease forwards';
  winSvg.appendChild(ln);
}

/* ── UI HELPERS ── */
function updateTurnUI(){
  var isX=state.turn==='X';
  barX.classList.toggle('active', isX);
  barO.classList.toggle('active',!isX);
  xTurnEl.style.color=isX?'':'transparent';
  oTurnEl.style.color=!isX?'':'transparent';
  xScoreEl.parentElement&&void 0;
  // bg tint
  document.getElementById('game').style.background=isX
    ?'linear-gradient(180deg,#07080f 0%,#0a0810 100%)'
    :'linear-gradient(180deg,#070a0f 0%,#070a10 100%)';
}

function updateScores(){
  xScoreEl.textContent=state.scores.X;
  oScoreEl.textContent=state.scores.O;
  document.getElementById('ms-xnum').textContent=state.scores.X;
  document.getElementById('ms-onum').textContent=state.scores.O;
}

function setStatus(msg,cls){
  statusEl.textContent=msg||'CHOOSE A CELL';
  statusEl.className='status '+(cls||'');
}

/* ── MODAL ── */
function showModal(winner){
  var mSym  =document.getElementById('mSym');
  var mTitle=document.getElementById('mTitle');
  var mSub  =document.getElementById('mSub');
  var mGlow =document.getElementById('mGlow');

  if(winner==='X'){
    mSym.textContent='✕';mSym.style.color='var(--x-col)';
    mSym.style.textShadow='0 0 30px var(--x-glow)';
    mTitle.textContent=state.px+' WINS!';
    mSub.textContent='EXCELLENT PLAY!';
    mGlow.style.background='var(--x-col)';
    launchConfetti('x');
  } else if(winner==='O'){
    mSym.textContent='○';mSym.style.color='var(--o-col)';
    mSym.style.textShadow='0 0 30px var(--o-glow)';
    mTitle.textContent=state.po+' WINS!';
    mSub.textContent='EXCELLENT PLAY!';
    mGlow.style.background='var(--o-col)';
    launchConfetti('o');
  } else {
    mSym.textContent='◈';mSym.style.color='var(--win-line)';
    mSym.style.textShadow='0 0 30px rgba(255,215,0,0.8)';
    mTitle.textContent="IT'S A DRAW!";
    mSub.textContent='EQUAL MATCH!';
    mGlow.style.background='var(--win-line)';
    launchConfetti('draw');
  }
  modal.classList.add('show');
}

/* ── CONFETTI ── */
var confAF=null;
function launchConfetti(who){
  var canvas=document.getElementById('confetti');
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var cols=who==='x'?['#ff6b35','#ff9500','#ffd700','#fff']:
            who==='o'?['#00d4ff','#0088ff','#a0e8ff','#fff']:
            ['#ff6b35','#00d4ff','#ffd700','#ff6b9d','#6bcb77'];
  var parts=Array.from({length:90},function(){return{
    x:Math.random()*canvas.width,
    y:-10-Math.random()*100,
    w:5+Math.random()*7,h:3+Math.random()*4,
    col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*Math.PI*2,
    vx:(Math.random()-0.5)*3,vy:2+Math.random()*3,
    vr:(Math.random()-0.5)*0.15,op:1
  };});
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      if(p.y>canvas.height*0.6)p.op-=0.02;
      ctx.save();ctx.globalAlpha=Math.max(0,p.op);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    parts.filter(function(p){return p.op>0;}).length>0
      ?void(confAF=requestAnimationFrame(draw))
      :ctx.clearRect(0,0,canvas.width,canvas.height);
    // keep only alive
    for(var i=parts.length-1;i>=0;i--){if(parts[i].op<=0)parts.splice(i,1);}
  }
  confAF=requestAnimationFrame(draw);
}
function stopConfetti(){
  if(confAF)cancelAnimationFrame(confAF);
  var c=document.getElementById('confetti');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

window.addEventListener('resize',function(){
  if(gameEl.style.display!=='none'){buildBoard();resetRound(true);}
});

})();
</script>
</body>
</html>
