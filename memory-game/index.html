<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Game — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0E1A;
      --card-bg: #131929;
      --card-border: #1e2d4a;
      --accent: #00FF88;
      --purple: #7C3AED;
      --p1: #00b4ff;
      --p2: #ff6b35;
      --text: #E8EAF0;
      --muted: #6B7A99;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      border-bottom: 1px solid var(--card-border);
      background: rgba(10,14,26,0.97);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-family:'Orbitron',monospace; font-weight:900; font-size:1.1rem; color:var(--accent); letter-spacing:2px; text-decoration:none; }
    .nav-logo span { color:var(--purple); }
    .back-btn { font-size:0.82rem; color:var(--muted); text-decoration:none; font-weight:500; transition:color 0.2s; }
    .back-btn:hover { color:var(--accent); }

    .game-wrapper {
      width: 100%;
      max-width: 1100px;
      padding: 1.2rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .game-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 2px;
    }
    .game-title span { color: var(--accent); }

    /* MODE TOGGLE */
    .mode-bar {
      display: flex;
      gap: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 5px;
    }
    .mode-btn {
      padding: 0.4rem 1.2rem;
      border-radius: 7px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--purple);
      color: #fff;
    }

    /* PLAYER PANELS */
    .players-bar {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 700px;
    }
    .player-panel {
      flex: 1;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      padding: 0.8rem 1rem;
      text-align: center;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .player-panel.p1-active { border-color: var(--p1); box-shadow: 0 0 20px rgba(0,180,255,0.2); }
    .player-panel.p2-active { border-color: var(--p2); box-shadow: 0 0 20px rgba(255,107,53,0.2); }
    .player-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-panel.p1 .player-panel::before { background: var(--p1); }
    .player-panel.p1-active::before { background: var(--p1); opacity: 1; }
    .player-panel.p2-active::before { background: var(--p2); opacity: 1; }
    .player-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .p1-panel .player-name { color: var(--p1); }
    .p2-panel .player-name { color: var(--p2); }
    .player-score {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      font-weight: 900;
    }
    .p1-panel .player-score { color: var(--p1); }
    .p2-panel .player-score { color: var(--p2); }
    .player-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .turn-arrow {
      font-size: 1.2rem;
      animation: pulse 0.8s infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

    /* SINGLE PLAYER STATS */
    .stats-bar {
      display: flex;
      gap: 0.8rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 0.8rem 1.5rem;
      width: 100%;
      max-width: 700px;
      justify-content: space-around;
    }
    .stat { text-align: center; }
    .stat-val { font-family:'Orbitron',monospace; font-size:1.2rem; font-weight:700; color:var(--accent); }
    .stat-lbl { font-size:0.68rem; color:var(--muted); margin-top:2px; letter-spacing:1px; }

    /* CONTROLS ROW */
    .controls-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .diff-btn {
      padding: 0.38rem 1rem;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn:hover, .diff-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,255,136,0.08);
    }
    .sep { width: 1px; height: 24px; background: var(--card-border); }
    .btn-restart-sm {
      padding: 0.38rem 1rem;
      border-radius: 8px;
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-restart-sm:hover { background: rgba(124,58,237,0.28); }

    /* CARD GRID — compact, fits more */
    .card-grid {
      display: grid;
      gap: 8px;
      width: 100%;
    }
    .card-grid.easy   { grid-template-columns: repeat(6, 1fr);  max-width: 660px; }
    .card-grid.medium { grid-template-columns: repeat(8, 1fr);  max-width: 880px; }
    .card-grid.hard   { grid-template-columns: repeat(10, 1fr); max-width: 1080px; }

    /* FLIP CARD */
    .flip-card {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
    }
    .flip-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      border-radius: 10px;
    }
    .flip-card.flipped .flip-inner,
    .flip-card.matched .flip-inner {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      position: absolute; inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .flip-front {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      font-size: 1.1rem;
      color: var(--muted);
      transition: border-color 0.2s;
    }
    .flip-card:hover:not(.flipped):not(.matched) .flip-front {
      border-color: var(--purple);
      background: #1a1f35;
    }
    .flip-back {
      background: #1a1040;
      border: 2px solid var(--purple);
      font-size: 1.6rem;
      transform: rotateY(180deg);
    }
    .flip-card.matched .flip-back {
      background: #0d2a1a;
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(0,255,136,0.3);
    }
    /* P1 / P2 matched colours */
    .flip-card.matched-p1 .flip-back { background: #0a1e2e; border-color: var(--p1); box-shadow: 0 0 14px rgba(0,180,255,0.3); }
    .flip-card.matched-p2 .flip-back { background: #2e1208; border-color: var(--p2); box-shadow: 0 0 14px rgba(255,107,53,0.3); }

    /* TURN TOAST */
    .turn-toast {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 0.5rem 1.5rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      pointer-events: none;
    }
    .turn-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* WIN OVERLAY */
    .win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,14,26,0.93);
      z-index: 50;
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 1.5rem;
    }
    .win-overlay.show { display: flex; }
    .win-emoji { font-size: 3.5rem; }
    .win-title { font-family:'Orbitron',monospace; font-size:1.8rem; font-weight:900; color:var(--accent); text-shadow:0 0 30px rgba(0,255,136,0.5); }
    .win-sub { color:var(--muted); font-size:0.9rem; }
    .win-scores {
      display: flex; gap: 1.2rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem 2rem;
    }
    .win-score { text-align:center; }
    .win-score-val { font-family:'Orbitron',monospace; font-size:1.8rem; font-weight:900; }
    .win-score-lbl { font-size:0.7rem; color:var(--muted); margin-top:2px; }
    .btn-restart {
      padding: 0.65rem 2rem;
      border-radius: 10px;
      background: var(--accent);
      color: #0A0E1A;
      border: none;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-restart:hover { background: #00cc70; box-shadow: 0 0 20px rgba(0,255,136,0.4); }

    @media (max-width: 600px) {
      .card-grid.easy   { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .card-grid.medium { grid-template-columns: repeat(6, 1fr); gap: 6px; }
      .card-grid.hard   { grid-template-columns: repeat(6, 1fr); gap: 5px; }
      .flip-back { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">GAME<span>ZONE</span></a>
  <a class="back-btn" href="../index.html">← Back</a>
</nav>

<div class="turn-toast" id="turnToast"></div>

<div class="game-wrapper">
  <div class="game-title">🧠 MEMORY <span>GAME</span></div>

  <!-- MODE TOGGLE -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn1P" onclick="setMode('1p')">👤 1 PLAYER</button>
    <button class="mode-btn" id="btn2P" onclick="setMode('2p')">👥 2 PLAYERS</button>
  </div>

  <!-- 1P STATS -->
  <div class="stats-bar" id="statsBar1P">
    <div class="stat"><div class="stat-val" id="moves">0</div><div class="stat-lbl">MOVES</div></div>
    <div class="stat"><div class="stat-val" id="timer">0:00</div><div class="stat-lbl">TIME</div></div>
    <div class="stat"><div class="stat-val" id="pairs">0</div><div class="stat-lbl">PAIRS</div></div>
    <div class="stat"><div class="stat-val" id="best">—</div><div class="stat-lbl">BEST</div></div>
  </div>

  <!-- 2P PANELS -->
  <div class="players-bar" id="playersBar2P" style="display:none">
    <div class="player-panel p1-panel" id="p1Panel">
      <div class="player-name">⚡ PLAYER 1</div>
      <div class="player-score" id="p1Score">0</div>
      <div class="player-sub">pairs</div>
    </div>
    <div style="display:flex;align-items:center;font-size:1.5rem;color:var(--muted)">VS</div>
    <div class="player-panel p2-panel" id="p2Panel">
      <div class="player-name">🔥 PLAYER 2</div>
      <div class="player-score" id="p2Score">0</div>
      <div class="player-sub">pairs</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-row">
    <button class="diff-btn active" id="dEasy"   onclick="setDifficulty('easy',   this)">EASY<br><span style="font-size:0.6rem;font-family:Inter">12 cards</span></button>
    <button class="diff-btn"        id="dMedium" onclick="setDifficulty('medium', this)">MEDIUM<br><span style="font-size:0.6rem;font-family:Inter">32 cards</span></button>
    <button class="diff-btn"        id="dHard"   onclick="setDifficulty('hard',   this)">HARD<br><span style="font-size:0.6rem;font-family:Inter">50 cards</span></button>
    <div class="sep"></div>
    <button class="btn-restart-sm" onclick="restartGame()">↺ RESTART</button>
  </div>

  <div class="card-grid easy" id="grid"></div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji" id="winEmoji">🎉</div>
  <div class="win-title" id="winTitle">YOU WIN!</div>
  <div class="win-sub" id="winSub">Saare pairs mil gaye!</div>
  <div class="win-scores" id="winScores"></div>
  <button class="btn-restart" onclick="restartGame()">PLAY AGAIN</button>
  <a class="back-btn" href="../index.html" style="margin-top:4px">← Back to GameZone</a>
</div>

<script>
  const EMOJIS = [
    '🐯','🦁','🐸','🐧','🦊','🐨','🦋','🐙',
    '🌈','⚡','🔥','🌊','🎯','🏆','💎','🚀',
    '🎸','🎺','🎻','🥁','🌺','🍕','🎃','🤖',
    '🦄','🐲','🍀','🌙','☀️','🎲','🧲','🏄'
  ];

  // Easy=6 pairs(12), Medium=16 pairs(32), Hard=25 pairs(50)
  const CONFIG = {
    easy:   { pairs: 6,  cols: 'easy'   },
    medium: { pairs: 16, cols: 'medium' },
    hard:   { pairs: 25, cols: 'hard'   }
  };

  let mode = '1p'; // '1p' or '2p'
  let difficulty = 'easy';
  let flipped = [];
  let matched = 0;
  let totalPairs = 0;
  let moves = 0;
  let timerInterval = null;
  let seconds = 0;
  let bestMoves = {};
  let lock = false;

  // 2P state
  let currentPlayer = 1;
  let p1Pairs = 0, p2Pairs = 0;

  /* ---- MODE ---- */
  function setMode(m) {
    mode = m;
    document.getElementById('btn1P').classList.toggle('active', m==='1p');
    document.getElementById('btn2P').classList.toggle('active', m==='2p');
    document.getElementById('statsBar1P').style.display  = m==='1p' ? 'flex' : 'none';
    document.getElementById('playersBar2P').style.display = m==='2p' ? 'flex' : 'none';
    restartGame();
  }

  /* ---- DIFFICULTY ---- */
  function setDifficulty(d, btn) {
    difficulty = d;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    restartGame();
  }

  /* ---- SHUFFLE ---- */
  function shuffle(arr) {
    for (let i = arr.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  /* ---- BUILD GRID ---- */
  function buildGrid() {
    const cfg = CONFIG[difficulty];
    totalPairs = cfg.pairs;
    const emojis = shuffle([...EMOJIS]).slice(0, totalPairs);
    const cards  = shuffle([...emojis, ...emojis]);

    const grid = document.getElementById('grid');
    grid.className = `card-grid ${cfg.cols}`;
    grid.innerHTML = '';

    cards.forEach((emoji, i) => {
      const fc = document.createElement('div');
      fc.className = 'flip-card';
      fc.dataset.emoji = emoji;
      fc.innerHTML = `<div class="flip-inner">
        <div class="flip-front">?</div>
        <div class="flip-back">${emoji}</div>
      </div>`;
      fc.addEventListener('click', onCardClick);
      grid.appendChild(fc);
    });

    // 2P turn indicator
    if (mode === '2p') updateTurnUI();
  }

  /* ---- CARD CLICK ---- */
  function onCardClick(e) {
    const card = e.currentTarget;
    if (lock) return;
    if (card.classList.contains('flipped') || card.classList.contains('matched') ||
        card.classList.contains('matched-p1') || card.classList.contains('matched-p2')) return;
    if (flipped.length === 2) return;

    if (mode==='1p' && moves===0 && flipped.length===0) startTimer();

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      if (mode==='1p') { moves++; document.getElementById('moves').textContent = moves; }
      checkMatch();
    }
  }

  /* ---- CHECK MATCH ---- */
  function checkMatch() {
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      setTimeout(() => {
        const cls = mode==='2p' ? (currentPlayer===1 ? 'matched-p1' : 'matched-p2') : 'matched';
        a.classList.add(cls); b.classList.add(cls);
        a.classList.remove('flipped'); b.classList.remove('flipped');
        matched++;

        if (mode==='2p') {
          if (currentPlayer===1) { p1Pairs++; document.getElementById('p1Score').textContent = p1Pairs; }
          else { p2Pairs++; document.getElementById('p2Score').textContent = p2Pairs; }
          // Same player gets another turn on match!
          showToast(`🎉 Player ${currentPlayer} got a pair! Play again!`);
        } else {
          document.getElementById('pairs').textContent = matched;
        }

        flipped = [];
        if (matched === totalPairs) onWin();
      }, 300);
    } else {
      lock = true;
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = [];
        lock = false;
        if (mode==='2p') {
          currentPlayer = currentPlayer===1 ? 2 : 1;
          updateTurnUI();
          showToast(`Player ${currentPlayer}'s turn!`);
        }
      }, 900);
    }
  }

  /* ---- 2P UI ---- */
  function updateTurnUI() {
    const p1 = document.getElementById('p1Panel');
    const p2 = document.getElementById('p2Panel');
    p1.classList.toggle('p1-active', currentPlayer===1);
    p2.classList.toggle('p2-active', currentPlayer===2);
  }

  function showToast(msg) {
    const t = document.getElementById('turnToast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._to);
    t._to = setTimeout(() => t.classList.remove('show'), 1600);
  }

  /* ---- TIMER (1P only) ---- */
  function startTimer() {
    seconds = 0;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  }

  /* ---- WIN ---- */
  function onWin() {
    clearInterval(timerInterval);
    const overlay = document.getElementById('winOverlay');

    if (mode==='1p') {
      const m=Math.floor(seconds/60), s=seconds%60;
      const timeStr=`${m}:${s.toString().padStart(2,'0')}`;
      if (!bestMoves[difficulty]||moves<bestMoves[difficulty]) {
        bestMoves[difficulty]=moves;
        document.getElementById('best').textContent=moves;
      }
      document.getElementById('winEmoji').textContent = '🏆';
      document.getElementById('winTitle').textContent = 'YOU WIN!';
      document.getElementById('winSub').textContent  = 'Saare pairs mil gaye!';
      document.getElementById('winScores').innerHTML = `
        <div class="win-score"><div class="win-score-val" style="color:var(--accent)">${moves}</div><div class="win-score-lbl">MOVES</div></div>
        <div class="win-score"><div class="win-score-val" style="color:var(--accent)">${timeStr}</div><div class="win-score-lbl">TIME</div></div>`;
    } else {
      const winner = p1Pairs > p2Pairs ? 1 : p2Pairs > p1Pairs ? 2 : 0;
      const col = winner===1 ? 'var(--p1)' : winner===2 ? 'var(--p2)' : 'var(--accent)';
      document.getElementById('winEmoji').textContent = winner===0 ? '🤝' : '🏆';
      document.getElementById('winTitle').style.color = col;
      document.getElementById('winTitle').textContent = winner===0 ? "IT'S A TIE!" : `PLAYER ${winner} WINS!`;
      document.getElementById('winSub').textContent   = winner===0 ? 'Dono ne barabar kiya!' : `Player ${winner} ne jeet liya!`;
      document.getElementById('winScores').innerHTML  = `
        <div class="win-score"><div class="win-score-val" style="color:var(--p1)">${p1Pairs}</div><div class="win-score-lbl">P1 PAIRS</div></div>
        <div class="win-score"><div class="win-score-val" style="color:var(--p2)">${p2Pairs}</div><div class="win-score-lbl">P2 PAIRS</div></div>`;
    }

    setTimeout(() => overlay.classList.add('show'), 500);
  }

  /* ---- RESTART ---- */
  function restartGame() {
    clearInterval(timerInterval);
    document.getElementById('winOverlay').classList.remove('show');
    flipped=[]; matched=0; moves=0; seconds=0; lock=false;
    currentPlayer=1; p1Pairs=0; p2Pairs=0;

    document.getElementById('moves').textContent='0';
    document.getElementById('timer').textContent='0:00';
    document.getElementById('pairs').textContent='0';
    document.getElementById('best').textContent=bestMoves[difficulty]||'—';
    document.getElementById('p1Score').textContent='0';
    document.getElementById('p2Score').textContent='0';
    document.getElementById('p1Panel').classList.remove('p1-active');
    document.getElementById('p2Panel').classList.remove('p2-active');

    buildGrid();
    if (mode==='2p') showToast('Player 1 starts! 🚀');
  }

  restartGame();
</script>
</body>
</html>
